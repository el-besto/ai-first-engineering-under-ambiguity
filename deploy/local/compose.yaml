# Minimal local runtime scaffold
services:
  api:
    image: bestow-poc-app
    build:
      context: ../../
      dockerfile: Dockerfile
    command: ["uv", "run", "uvicorn", "drivers.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - LANGSMITH_TRACING=false
      - LLM_GUARDRAIL_API_BASE=http://ollama:11434

  ui:
    image: bestow-poc-app
    build:
      context: ../../
      dockerfile: Dockerfile
    command: ["uv", "run", "streamlit", "run", "drivers/ui/streamlit/streamlit_app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - ../../.env
    environment:
      - LANGSMITH_TRACING=false
      - PYTHONPATH=.
      - LLM_GUARDRAIL_API_BASE=http://ollama:11434

  ollama:
    image: ollama/ollama:0.5.12
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Ollama needs to start and then pull the model
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.1:8b && wait"]

volumes:
  ollama_data:
