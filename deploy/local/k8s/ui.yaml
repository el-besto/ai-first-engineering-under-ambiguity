apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: app
          image: bestow-poc-app
          command: ["uv", "run", "python", "-m", "debugpy", "--listen", "0.0.0.0:5679", "-m", "streamlit", "run", "drivers/ui/streamlit/streamlit_app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
          envFrom:
            - secretRef:
                name: bestow-env
                optional: true
          env:
            - name: LANGSMITH_TRACING
              value: "false"
            - name: PYTHONPATH
              value: "."
          ports:
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: ui
spec:
  selector:
    app: ui
  ports:
    - port: 8501
      targetPort: 8501
