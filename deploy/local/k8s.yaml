apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: app
          image: bestow-poc-app
          command: ["uv", "run", "uvicorn", "drivers.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - secretRef:
                name: bestow-env
                optional: true
          env:
            - name: LANGSMITH_TRACING
              value: "false"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: app
          image: bestow-poc-app
          command: ["uv", "run", "streamlit", "run", "drivers/ui/streamlit/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
          envFrom:
            - secretRef:
                name: bestow-env
                optional: true
          env:
            - name: LANGSMITH_TRACING
              value: "false"
          ports:
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: ui
spec:
  selector:
    app: ui
  ports:
    - port: 8501
      targetPort: 8501
